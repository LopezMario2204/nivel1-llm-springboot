# ═══════════════════════════════════════════════════════════════════════
#  Nivel 1 — Configuración de Proveedores LLM
#  Curso: Desarrollo Web Avanzado
# ═══════════════════════════════════════════════════════════════════════

server.port=8080

# ── Proveedor activo ────────────────────────────────────────────────────
# Valores posibles: gemini | groq | ollama
# Cambia este valor para activar el proveedor que quieres usar.
llm.provider=gemini

# ── OPCIÓN A: Google AI Studio (Gemini) ─────────────────────────────────
# Obtener key en: https://ai.google.dev
# En IntelliJ: Run > Edit Configurations > Environment Variables
#   Agregar:  GEMINI_API_KEY=AIzaSy...
gemini.api.key=${GEMINI_API_KEY}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta/openai
gemini.model=gemini-2.0-flash

# ── OPCIÓN B: Groq ───────────────────────────────────────────────────────
# Obtener key en: https://console.groq.com
# En IntelliJ: Run > Edit Configurations > Environment Variables
#   Agregar:  GROQ_API_KEY=gsk_...
#groq.api.key=${GROQ_API_KEY}
#groq.base-url=https://api.groq.com/openai/v1
#groq.model=llama-3.3-70b-versatile

# ── OPCIÓN C: Ollama (local) ─────────────────────────────────────────────
# Requiere Docker corriendo:
#   docker run -d -p 11434:11434 --name ollama ollama/ollama
#   docker exec ollama ollama pull llama3.2:1b
ollama.base-url=http://localhost:11434
ollama.model=llama3.2:1b

# ── Logging para ver las llamadas HTTP ──────────────────────────────────
logging.level.com.curso.llm=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG
